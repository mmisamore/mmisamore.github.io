<p>Found <a href="http://christopherpoole.github.io/using-mathjax-on-github-pages">this post</a> which help me to set up mathjax support that was compatible with github. In summary, I switched to the kramdown parser in Jekyll, dropped the Mathjax CDN code into the head tag of my default.html, and rewrote <a href="/2011/02/20/Fun-with-finite-strings">Fun with Finite Strings</a> to use real LaTeX between \\( and )\\ tags.</p>
